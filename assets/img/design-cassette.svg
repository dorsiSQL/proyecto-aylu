  <text x="120" y="320" fill="#f4c542" font-size="90" font-family="Arial, Helvetica, sans-serif" font-weight="700">CASSETTE</text>
  <text x="120" y="420" fill="#f5ead4" font-size="52" font-family="Arial, Helvetica, sans-serif">Vibra rockera</text>
  <text x="120" y="1020" fill="#f5ead4" opacity=".78" font-size="42" font-family="Arial, Helvetica, sans-serif">RETRO REMERAS</text>
  <rect width="1200" height="1200" fill="#fff" filter="url(#grain)" opacity=".15"/>
