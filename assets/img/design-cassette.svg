        <feFuncA type="table" tableValues="0 0 .04 .07"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="1200" height="1200" fill="#121212"/>
  <rect x="70" y="70" width="1060" height="1060" rx="42" fill="none" stroke="url(#g)" stroke-width="20"/>
  <circle cx="1020" cy="190" r="72" fill="#c82f2f" opacity=".9"/>
  <circle cx="940" cy="260" r="28" fill="#f4c542" opacity=".9"/>
